# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Runs: Frontend (Static Files) + Backend (Node.js + Express) in ONE container
# MongoDB is hosted on Atlas (cloud) — no local container needed
#
# Usage:
#   docker-compose up --build        # build and start all services
#   docker-compose up -d             # run in background (detached)
#   docker-compose down              # stop all services
#   docker-compose logs -f           # view live logs
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── Combined: Frontend + Backend (Node.js + Express) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: fintrack-app
    restart: unless-stopped
    ports:
      - "8000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}        # loaded from .env file
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    networks:
      - fintrack-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  fintrack-network:
    driver: bridge
